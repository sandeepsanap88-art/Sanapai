name: Build Sanap AI APK
on:
  push:
    branches: [ main ]
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Find APK
        run: find . -name "*.apk" 2>/dev/null || echo "APK not found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sanap-AI-APK
          path: build/app/outputs/apk/release/app-release.apk
          if-no-files-found: warn
