name: Build Sanap AI APK
on:
  push:
    branches: [ main ]
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List files
        run: ls -la

      - name: Unzip project
        run: unzip -o sanap_ai_flutter.zip

      - name: List after unzip
        run: ls -la && ls -la sanap_ai/ || ls -la

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Flutter pub get
        run: cd sanap_ai && flutter pub get

      - name: Build APK
        run: cd sanap_ai && flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sanap-AI-APK
          path: sanap_ai/build/app/outputs/flutter-apk/app-release.apk
