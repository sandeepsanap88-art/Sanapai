name: Build Sanap AI APK
on:
  push:
    branches: [ main ]
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find ZIP and extract
        run: |
          echo "=== Files in repo ==="
          find . -name "*.zip" -type f
          ZIP=$(find . -name "*.zip" | head -1)
          echo "Found ZIP: $ZIP"
          unzip -o "$ZIP" -d extracted/
          echo "=== Extracted ==="
          ls -la extracted/

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Flutter pub get
        run: |
          cd extracted/sanap_ai
          flutter pub get

      - name: Build APK
        run: |
          cd extracted/sanap_ai
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sanap-AI-APK
          path: extracted/sanap_ai/build/app/outputs/flutter-apk/app-release.apk
